name: Daily Stock AI

on:
  workflow_dispatch:
  schedule:
    - cron: '0 11 * * 1-5'

concurrency:
  group: stock-ai
  cancel-in-progress: true

jobs:
  run-ai:
    runs-on: ubuntu-latest

    steps:

      # =========================
      # ① checkout
      # =========================
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # =========================
      # ② ディレクトリ作成（先に作る）
      # =========================
      - name: Create data directory
        run: mkdir -p stock_data logs

      # =========================
      # ③ キャッシュ復元（最重要）
      # =========================
      - name: Restore data cache
        uses: actions/cache@v3
        with:
          path: stock_data
          key: stock-data-cache-v1
          restore-keys: |
            stock-data-cache-

      # =========================
      # ④ Python
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # =========================
      # ⑤ 依存関係
      # =========================
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements_ai.txt

      # =========================
      # ⑥ 実行
      # =========================
      - name: Run daily AI pipeline
        run: python run_daily.py

      # =========================
      # ⑦ キャッシュ保存（重要）
      # =========================
      - name: Save data cache
        uses: actions/cache@v3
        with:
          path: stock_data
          key: stock-data-cache-v1

      # =========================
      # ⑧ push（順序修正）
      # =========================
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # 🔥 先にpull（超重要）
          git pull --rebase origin main

          git add today_picks_free.csv note_article.txt logs/ || true
          git commit -m "Update outputs [skip ci]" || echo "no change"

          git push origin HEAD:main