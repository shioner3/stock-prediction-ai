name: Daily Stock AI

on:
  workflow_dispatch:
  schedule:
    - cron: '0 11 * * 1-5'   # 日本時間20時

concurrency:
  group: stock-ai
  cancel-in-progress: true

jobs:
  run-ai:
    runs-on: ubuntu-latest

    steps:

      # =========================
      # ① リポジトリ取得
      # =========================
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # =========================
      # ② ディレクトリ作成
      # =========================
      - name: Create directories
        run: mkdir -p stock_data logs

      # =========================
      # ③ キャッシュ復元（改良版）
      # 👉 parquet単体キャッシュに変更
      # =========================
      - name: Restore price cache
        uses: actions/cache@v3
        with:
          path: stock_data/prices.parquet
          key: price-cache-v1
          restore-keys: |
            price-cache-

      # =========================
      # ④ Python環境
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # =========================
      # ⑤ 依存関係
      # =========================
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements_ai.txt

      # =========================
      # ⑥ パイプライン実行
      # =========================
      - name: Run daily pipeline
        run: python run_daily.py

      # =========================
      # ⑦ キャッシュ保存（超重要）
      # =========================
      - name: Save price cache
        uses: actions/cache@v3
        with:
          path: stock_data/prices.parquet
          key: price-cache-v1

      # =========================
      # ⑧ デバッグ（修正版）
      # =========================
      - name: Check outputs
        run: |
          echo "===== FILES ====="
          ls -R

          echo "===== TODAY PICKS ====="
          cat outputs/today_picks.csv || echo "no picks"

          echo "===== FREE ARTICLE ====="
          cat outputs/note_free.txt || echo "no free article"

          echo "===== PAID ARTICLE ====="
          cat outputs/note_paid.txt || echo "no paid article"

      # =========================
      # ⑨ push（安全版）
      # =========================
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          git add outputs/ logs/ || true

          git commit -m "Update daily AI outputs [skip ci]" || echo "no change"

          # 🔥 コンフリクト防止
          git pull --rebase origin main

          git push origin HEAD:main