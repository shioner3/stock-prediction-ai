name: Daily Stock AI

on:
  workflow_dispatch:
  schedule:
    - cron: '0 21 * * 0-4'   # 日本時間 平日朝6時

jobs:
  run-ai:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v3

      # 🔥 キャッシュ修正版
      - name: Cache price data
        uses: actions/cache@v3
        with:
          path: stock_data
          key: prices-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            prices-${{ runner.os }}-

      - name: Create data directory
        run: mkdir -p stock_data logs

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements_ai.txt

      - name: Run daily AI pipeline
        run: python run_daily.py

      - name: Check FREE CSV
        run: |
          if [ -f "today_picks_free.csv" ]; then
            echo "✅ FREE CSV OK"
          else
            echo "❌ FREE CSV missing"
            exit 1
          fi

      - name: Check article
        run: |
          if [ -f "note_article.txt" ]; then
            echo "📝 article OK"
          else
            echo "❌ article missing"
            exit 1
          fi

      - name: Check logs
        run: |
          ls -R logs || echo "logsフォルダなし"

      - name: Commit and push all outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add today_picks_free.csv note_article.txt logs/ || true

          git commit -m "Update outputs [skip ci]" || echo "no change"
          git push

      - name: Push FREE CSV to Hugging Face
        run: |
          git clone https://user:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/shioner/Stock-Prediction-Ai hf_space

          cp today_picks_free.csv hf_space/

          cd hf_space

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add today_picks_free.csv
          git commit -m "auto update free csv" || echo "no change"
          git push