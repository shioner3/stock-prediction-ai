name: Daily Stock AI

on:
  schedule:
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

jobs:
  run-ai:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install libraries
        run: |
          pip install pandas numpy yfinance lightgbm tqdm pyarrow scikit-learn

      - name: Check run_daily.py exists
        run: ls -l run_daily.py

      - name: Run AI
        run: python run_daily.py
