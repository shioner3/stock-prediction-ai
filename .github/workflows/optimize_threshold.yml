name: Optimize Threshold

on:
  workflow_dispatch:   # 手動実行

jobs:
  optimize:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 1️⃣ リポジトリ取得
      # =========================
      - uses: actions/checkout@v3

      # =========================
      # 2️⃣ Python環境
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # =========================
      # 3️⃣ 依存関係
      # =========================
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements_ai.txt

      # =========================
      # 4️⃣ データ準備
      # =========================
      - name: Prepare data
        run: |
          python download_prices.py
          python feature_engineering.py

      # =========================
      # 5️⃣ 最適化実行（ここが変更点🔥）
      # =========================
      - name: Run Optimization
        run: python optimize_threshold.py

      # =========================
      # 6️⃣ 結果確認
      # =========================
      - name: Check outputs
        run: |
          echo "===== FILES ====="
          ls -l

          echo "===== OPTIMIZATION RESULT ====="
          cat threshold_optimization.csv || echo "no result file"

      # =========================
      # 7️⃣ GitHubへ保存
      # =========================
      - name: Commit optimization results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add threshold_optimization.csv || true

          git commit -m "update threshold optimization [skip ci]" || echo "no change"

          git push origin HEAD:main