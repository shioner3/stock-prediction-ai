name: Daily Stock AI

on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * 1-5'

jobs:
  run-ai:
    runs-on: ubuntu-latest

    steps:

      # =========================
      # 1️⃣ リポジトリ取得
      # =========================
      - uses: actions/checkout@v3

      # =========================
      # 2️⃣ キャッシュ復元
      # =========================
      - name: Cache price data
        uses: actions/cache@v3
        with:
          path: stock_data
          key: prices-cache-v1

      # =========================
      # 3️⃣ ディレクトリ作成
      # =========================
      - name: Create data directory
        run: mkdir -p stock_data logs

      # =========================
      # 4️⃣ Python環境
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # =========================
      # 5️⃣ 依存関係
      # =========================
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements_ai.txt

      # =========================
      # 6️⃣ AIパイプライン
      # =========================
      - name: Run daily AI pipeline
        run: python run_daily.py

      # =========================
      # 7️⃣ FREE CSVチェック
      # =========================
      - name: Check FREE CSV
        run: |
          if [ -f "today_picks_free.csv" ]; then
            echo "✅ FREE CSV OK"
          else
            echo "❌ FREE CSV missing"
            exit 1
          fi

      # =========================
      # 8️⃣ 記事チェック
      # =========================
      - name: Check article
        run: |
          if [ -f "note_article.txt" ]; then
            echo "📝 article OK"
          else
            echo "❌ article missing"
            exit 1
          fi

      # =========================
      # 9️⃣ logs確認
      # =========================
      - name: Check logs
        run: |
          ls -R logs || echo "logsフォルダなし"

      
　　　　# =========================
　　　　# 🔟 GitHubへ保存（完全版）
　　　　# =========================
　　　　- name: Commit and push all outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # 🔥 FREE / PREMIUM / ARTICLE / LOGSすべて追加
          git add today_picks_free.csv today_picks_premium.csv note_article.txt logs/ || true

          git commit -m "Update free & premium picks, article & logs [skip ci]" || echo "no change"
          git push

      # =========================
      # 🔥 Hugging Faceへ送信（修正版）
      # =========================
      - name: Push FREE CSV to Hugging Face
        run: |
          git clone https://user:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/shioner/Stock-Prediction-Ai hf_space

          # FREE CSVだけ公開
          cp today_picks_free.csv hf_space/

          cd hf_space

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add today_picks_free.csv
          git commit -m "auto update free csv" || echo "no change"
          git push