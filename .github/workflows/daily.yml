name: Daily Stock AI

on:
  schedule:
    - cron: '0 22 * * 1-5'  # 月〜金 7:00 JST
  workflow_dispatch:        # 手動実行も可能

jobs:
  run-ai:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ リポジトリをチェックアウト
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 2️⃣ Python 環境セットアップ
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # 3️⃣ ライブラリインストール
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # 4️⃣ run_daily.py 実行
      - name: Run daily AI pipeline
        run: python run_daily.py

      # 5️⃣ 出力ファイル確認
      - name: Check CSV
        run: |
          if [ -f "today_picks.csv" ]; then
            echo "✅ today_picks.csv が生成されました"
            ls -l today_picks.csv
          else
            echo "❌ today_picks.csv が生成されませんでした"
            exit 1
          fi
