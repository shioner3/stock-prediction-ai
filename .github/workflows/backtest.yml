name: Backtest

on:
  workflow_dispatch:   # 手動実行
  

jobs:
  backtest:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 1️⃣ リポジトリ取得
      # =========================
      - uses: actions/checkout@v3

      # =========================
      # 2️⃣ Python環境
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # =========================
      # 3️⃣ 依存関係
      # =========================
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements_ai.txt

      # =========================
      # 4️⃣ データ準備（重要）
      # =========================
      - name: Prepare data
        run: |
          python download_prices.py
          python feature_engineering.py

      # =========================
      # 5️⃣ バックテスト実行
      # =========================
      - name: Run Backtest
        run: python backtest.py

      # =========================
      # 6️⃣ 結果確認（デバッグ）
      # =========================
      - name: Check outputs
        run: |
          echo "===== FILES ====="
          ls -l

          echo "===== BACKTEST RESULT ====="
          cat backtest_summary.csv || echo "no result file"

      # =========================
      # 7️⃣ GitHubへ保存
      # =========================
      - name: Commit backtest results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add rolling_backtest_realistic_v2.csv || true

          git commit -m "update backtest result [skip ci]" || echo "no change"

          git push origin HEAD:main