name: Run Feature Engineering

on:
  workflow_dispatch:

jobs:
  run-feature:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Pythonセットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 依存関係インストール
        run: |
          pip install -r requirements.txt

      - name: 特徴量生成だけ実行
        run: |
          python feature_engineering.py