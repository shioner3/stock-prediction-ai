name: Backtest Pipeline

on:
  workflow_dispatch:

jobs:
  backtest:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 1️⃣ リポジトリ取得
      # =========================
      - uses: actions/checkout@v3

      # =========================
      # 2️⃣ Python環境
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # =========================
      # 3️⃣ キャッシュ復元（価格データ）
      # =========================
      - name: Restore price cache
        uses: actions/cache@v3
        with:
          path: stock_data/prices.parquet
          key: price-cache-v1
          restore-keys: |
            price-cache-

      # =========================
      # 4️⃣ 依存関係
      # =========================
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements_ai.txt

      # =========================
      # 5️⃣ データ取得
      # =========================
      - name: Download prices
        run: |
          python download_prices.py

      # =========================
      # 6️⃣ 特徴量作成
      # =========================
      - name: Feature Engineering
        run: |
          python feature_engineering.py

      # =========================
      # 8️⃣ モデル学習・予測生成（🔥追加・超重要）
      # =========================
      - name: Run Prediction
        run: |
          python run_prediction.py

      # =========================
      # 9️⃣ キャッシュ保存
      # =========================
      - name: Save price cache
        uses: actions/cache@v3
        with:
          path: stock_data/prices.parquet
          key: price-cache-v1

      # =========================
      # 🔟 バックテスト
      # =========================
      - name: Run Backtest
        run: |
          python backtest.py

      # =========================
      # 11️⃣ デバッグ
      # =========================
      - name: Check outputs
        run: |
          echo "===== FILES ====="
          ls -l

          echo "===== BACKTEST RESULT ====="
          cat backtest_summary.csv || echo "no result file"

      # =========================
      # 12️⃣ 結果保存
      # =========================
      - name: Commit backtest results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add rolling_backtest_realistic_v2.csv || true
          git add backtest_summary.csv || true
          git add predictions.csv || true

          git commit -m "update full pipeline results [skip ci]" || echo "no change"
          git push origin HEAD:main