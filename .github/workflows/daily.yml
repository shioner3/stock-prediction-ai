name: Daily Stock AI

on:
  schedule:
    - cron: '0 22 * * 1-5'  # JST 7:00
  workflow_dispatch:

jobs:
  run-ai:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install libraries
        run: |
          pip install pandas numpy yfinance lightgbm tqdm pyarrow scikit-learn streamlit

      - name: Run AI pipeline
        working-directory: ${{ github.workspace }}
        run: python run_daily.py

      - name: Check output
        run: |
          if [ -f "${{ github.workspace }}/today_picks.csv" ]; then
            echo "today_picks.csv が生成されました"
            ls -l "${{ github.workspace }}/today_picks.csv"
          else
            echo "today_picks.csv が生成されませんでした"
            exit 1
          fi
