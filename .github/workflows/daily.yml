name: Daily Stock AI

on:
  schedule:
    - cron: '0 22 * * 1-5'  # JST 7:00
  workflow_dispatch:

jobs:
  run-ai:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # デバッグ用：ディレクトリ構造確認
      - name: List repository files recursively
        run: ls -R

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install libraries
        run: |
          pip install pandas numpy yfinance lightgbm tqdm pyarrow scikit-learn streamlit

      - name: Run AI pipeline
        run: python stock-prediction-ai/run_daily.py
