name: Daily Stock AI

on:
  schedule:
    - cron: '0 22 * * 1-5'  # 月〜金 7:00 JST
  workflow_dispatch:

jobs:
  run-ai:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ リポジトリ取得
      - uses: actions/checkout@v3

      # 2️⃣ Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # 3️⃣ 依存関係
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # 4️⃣ DBキャッシュ
      - name: Cache stock database
        uses: actions/cache@v3
        with:
          path: stock.db
          key: ${{ runner.os }}-stock-db
          restore-keys: |
            ${{ runner.os }}-stock-db

      # 5️⃣ AI実行
      - name: Run daily AI pipeline
        run: python run_daily.py

      # 6️⃣ CSV確認
      - name: Check CSV
        run: |
          if [ -f "today_picks.csv" ]; then
            echo "✅ today_picks.csv が生成されました"
            ls -l today_picks.csv
          else
            echo "❌ today_picks.csv が生成されませんでした"
            exit 1
          fi

      # 7️⃣ picksだけ保存
      - name: Commit and push picks
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add today_picks.csv
          git diff --cached --quiet || git commit -m "Update picks [skip ci]"
          git push
