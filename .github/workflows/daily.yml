name: Daily Stock AI

on:
  schedule:
    - cron: '0 22 * * 1-5'  # 月〜金 7:00 JST
  workflow_dispatch:

jobs:
  run-ai:
    runs-on: ubuntu-latest

    steps:

      # 1️⃣ リポジトリ取得
      - uses: actions/checkout@v3

      # 2️⃣ Python環境
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # 3️⃣ 依存関係インストール
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # 4️⃣ DuckDBキャッシュ復元
      - name: Restore stock database cache
        uses: actions/cache@v3
        id: stock-cache
        with:
          path: stock.db
          key: ${{ runner.os }}-stock-db
          restore-keys: |
            ${{ runner.os }}-stock-db

      # 5️⃣ DB初期化（キャッシュ復元後にstock.dbが無ければ作成）
      - name: Initialize DuckDB if missing
        run: |
          python - <<'EOF'
          import os
          import duckdb

          DB_FILE = "stock.db"

          if not os.path.exists(DB_FILE):
              print("DuckDB not found. Creating database...")
              con = duckdb.connect(DB_FILE)
              con.execute("""
                  CREATE TABLE IF NOT EXISTS stock_prices(
                      Date DATE,
                      Ticker VARCHAR,
                      Open DOUBLE,
                      High DOUBLE,
                      Low DOUBLE,
                      Close DOUBLE,
                      Volume BIGINT
                  )
              """)
              con.close()
EOF

      # 6️⃣ DBサイズチェック（破損防止）
      - name: Check DuckDB integrity
        run: |
          python - <<'EOF'
          import os

          DB_FILE = "stock.db"
          MIN_SIZE = 1000000  # 1MB未満は破損と判断

          size = os.path.getsize(DB_FILE)
          print("DB size:", size)
          if size < MIN_SIZE:
              raise Exception("DB破損の可能性あり。ジョブ停止。")
EOF

      # 7️⃣ AIパイプライン実行（差分取得が有効）
      - name: Run daily AI pipeline
        run: python run_daily.py

      # 8️⃣ CSV確認
      - name: Check CSV
        run: |
          if [ -f "today_picks.csv" ]; then
            echo "✅ today_picks.csv が生成されました"
            ls -l today_picks.csv
          else
            echo "❌ today_picks.csv が生成されませんでした"
            exit 1

      # 9️⃣ CSVだけ GitHub にコミット
      - name: Commit and push picks
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add today_picks.csv
          git diff --cached --quiet || git commit -m "Update picks [skip ci]"
          git push

      # 🔟 DuckDBキャッシュ保存（最後に必ず実行）
      - name: Save stock database cache
        if: success()
        uses: actions/cache@v3
        with:
          path: stock.db
          key: ${{ runner.os }}-stock-db
