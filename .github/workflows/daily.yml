name: Daily Stock AI

on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * 1-5'

jobs:
  run-ai:
    runs-on: ubuntu-latest

    steps:

      # 1️⃣ リポジトリ取得
      - uses: actions/checkout@v3

      # 2️⃣ キャッシュ復元
      - name: Cache price data
        uses: actions/cache@v3
        with:
          path: stock_data
          key: prices-cache-v1

      # 3️⃣ ディレクトリ作成
      - name: Create data directory
        run: mkdir -p stock_data logs

      # 4️⃣ Python環境
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # 5️⃣ 依存関係インストール
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements_ai.txt

      # 6️⃣ AIパイプライン
      - name: Run daily AI pipeline
        run: python run_daily.py

      # 7️⃣ CSV確認
      - name: Check CSV
        run: |
          if [ -f "today_picks.csv" ]; then
            echo "✅ today_picks.csv が生成されました"
          else
            echo "❌ CSVなし"
            exit 1
          fi

      # 7.5️⃣ 記事確認（追加）
      - name: Check article
        run: |
          if [ -f "note_article.txt" ]; then
            echo "📝 note_article.txt 生成OK"
          else
            echo "❌ 記事なし"
            exit 1
          fi

      # 8️⃣ logs確認（デバッグ用）
      - name: Check logs
        run: |
          ls -R logs || echo "logsフォルダなし"

      # 9️⃣ GitHubへ保存（🔥ここ修正）
      - name: Commit and push all outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # 👇ここが重要
          git add today_picks.csv note_article.txt logs/ || true

          git commit -m "Update picks, article & logs [skip ci]" || echo "no change"
          git push

      # 🔟 HuggingFaceへpush
      - name: Push CSV to Hugging Face
        run: |
          git clone https://user:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/shioner/Stock-Prediction-Ai hf_space

          cp today_picks.csv hf_space/

          cd hf_space

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add today_picks.csv
          git commit -m "auto update csv" || echo "no change"
          git push