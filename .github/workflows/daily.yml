name: Daily Stock AI

on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * 1-5'

jobs:
  run-ai:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:

      # 1️⃣ リポジトリ取得
      - uses: actions/checkout@v3

      # 2️⃣ キャッシュ復元
      - name: Cache price data
        uses: actions/cache@v3
        with:
          path: stock_data
          key: prices-cache-v1

      # 3️⃣ ディレクトリ作成
      - name: Create data directory
        run: mkdir -p stock_data

      # 4️⃣ Python環境
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # 5️⃣ 依存関係インストール
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements_ai.txt

      # 6️⃣ AIパイプライン（ここでCSV＋記事生成される）
      - name: Run daily AI pipeline
        run: python run_daily.py

      # 7️⃣ CSV確認
      - name: Check CSV
        run: |
          if [ -f "today_picks.csv" ]; then
            echo "✅ today_picks.csv が生成されました"
          else
            echo "❌ CSVなし"
            exit 1
          fi

      # 8️⃣ 記事確認（追加）
      - name: Check Article
        run: |
          if [ -f "note_article.txt" ]; then
            echo "📝 記事生成OK"
          else
            echo "❌ 記事なし"
            exit 1
          fi

      # 9️⃣ GitHubへ保存（CSV + 記事 + 履歴）
      - name: Commit and push all outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add today_picks.csv note_article.txt daily_reports/
          git commit -m "auto: daily report [skip ci]" || echo "no change"
          git push

      # 🔟 Artifacts（ダウンロード用）
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: daily-report
          path: |
            today_picks.csv
            note_article.txt
            daily_reports/

      # 1️⃣1️⃣ HuggingFaceへpush（CSV＋記事）
      - name: Push to Hugging Face
        run: |
          git clone https://user:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/shioner/Stock-Prediction-Ai hf_space

          cp today_picks.csv hf_space/
          cp note_article.txt hf_space/

          cd hf_space

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add today_picks.csv note_article.txt
          git commit -m "auto update data" || echo "no change"
          git push
