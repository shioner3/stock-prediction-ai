name: Daily Stock AI

on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * 1-5'  # 月〜金 7:00 JST

jobs:
  run-ai:
    runs-on: ubuntu-latest

    steps:

      # 1️⃣ リポジトリ取得
      - uses: actions/checkout@v3

      # 2️⃣ Python環境
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # 3️⃣ 依存関係インストール
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements_ai.txt

      # 4️⃣ データディレクトリ作成
      - name: Create data directory
        run: mkdir -p stock_data

      # 5️⃣ Parquetキャッシュ復元（＋保存）
      - name: Cache price data
        uses: actions/cache@v3
        with:
          path: stock_data/prices.parquet
          key: ${{ runner.os }}-prices-v1
          restore-keys: |
            ${{ runner.os }}-prices-

      # 6️⃣ AIパイプライン実行
      - name: Run daily AI pipeline
        run: python run_daily.py

      # 7️⃣ CSV確認
      - name: Check CSV
        run: |
          if [ -f "today_picks.csv" ]; then
            echo "✅ today_picks.csv が生成されました"
            ls -l today_picks.csv
          else
            echo "❌ today_picks.csv が生成されませんでした"
            exit 1
          fi

      # 8️⃣ CSVだけ GitHub にコミット
      - name: Commit and push picks
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add today_picks.csv
          git commit -m "Update picks [skip ci]" || echo "no change"
          git push

      # 9️⃣ HuggingFaceへCSVをpush
      - name: Push CSV to Hugging Face
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"

          # Spaceをclone（ここにトークン使う）
          git clone https://user:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/shioner/Stock-Prediction-Ai hf_space

          # CSVコピー
          cp today_picks.csv hf_space/

          cd hf_space

          git add today_picks.csv
          git commit -m "auto update csv" || echo "no change"
          git push
