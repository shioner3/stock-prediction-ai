name: Backtest

on:
  workflow_dispatch:

jobs:
  backtest:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 1️⃣ リポジトリ取得
      # =========================
      - uses: actions/checkout@v3

      # =========================
      # 2️⃣ Python環境
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # =========================
      # 3️⃣ キャッシュ復元（最重要）
      # =========================
      - name: Restore price cache
        uses: actions/cache@v3
        with:
          path: stock_data/prices.parquet
          key: price-cache-v1
          restore-keys: |
            price-cache-

      # =========================
      # 4️⃣ 依存関係
      # =========================
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements_ai.txt

      # =========================
      # 5️⃣ データ準備
      # =========================
      - name: Prepare data
        run: |
          python download_prices.py
          python feature_engineering.py

      # =========================
      # 6️⃣ キャッシュ保存（超重要）
      # =========================
      - name: Save price cache
        uses: actions/cache@v3
        with:
          path: stock_data/prices.parquet
          key: price-cache-v1

      # =========================
      # 7️⃣ バックテスト
      # =========================
      - name: Run Backtest
        run: python backtest.py

      # =========================
      # 8️⃣ デバッグ
      # =========================
      - name: Check outputs
        run: |
          echo "===== FILES ====="
          ls -l

          echo "===== BACKTEST RESULT ====="
          cat backtest_summary.csv || echo "no result file"

      # =========================
      # 9️⃣ 結果保存
      # =========================
      - name: Commit backtest results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add rolling_backtest_realistic_v2.csv || true

          git commit -m "update backtest result [skip ci]" || echo "no change"

          git push origin HEAD:main